<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TomasDeAlmeida_8.1</title>
  <style>
    body {
      margin: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    div {
      background-color: steelblue;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .div1 {
      width: 30vw;
      height: 20vh;
    }

    .div2 {
      width: 30vh;
      height: 20vw;
    }

    .div3 {
      width: 30vmax;
      height: 20vmin;
    }

    .div4 {
      width: 30vmax;
      height: 200px;
    }
  </style>
</head>
<body>
  <div class="div1">div1: 30vw x 20vh</div>
  <div class="div2">div2: 30vh x 20vw</div>
  <div class="div3">div3: 30vmax x 20vmin</div>
  <div class="div4">div4: 30vmax x 200px</div>
</body>
</html>
